name: durga
description: "DURGA - Women Safety Application"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.5

  # Local Storage
  shared_preferences: ^2.3.2

  # Location
  geolocator: ^11.1.0
  geocoding: ^3.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Camera & Gallery
  image_picker: ^1.1.2

  # Open Maps / Phone / SMS
  url_launcher: ^6.3.0

  # Fonts
  google_fonts: ^6.2.1

  # SVG Icons
  flutter_svg: ^2.0.10+1

  # Google Maps
  google_maps_flutter: ^2.9.0

  # Simple Animations
  flutter_animate: ^4.5.0

  # Icons
  font_awesome_flutter: ^10.7.0

  # UUID Generator
  uuid: ^4.5.1

  # Date Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Uncomment when we add custom fonts
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700